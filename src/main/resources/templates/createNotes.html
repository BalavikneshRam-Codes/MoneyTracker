<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/createNote.css}" /></head>
<body>
<div th:replace="~{fragments/commonHeader :: header}"></div>
<div class="app-container">
    <div class="d-flex justify-content-between mb-4">
        <span class="header-text header-cancel"><i class="fas fa-times me-1"></i> CANCEL</span>
        <span class="header-text header-save"><i class="fas fa-check me-1"></i> SAVE</span>
    </div>

    <div class="d-flex align-items-center justify-content-center nav-tabs" id="transaction-tabs">
        <div class="nav-item">INCOME</div>
        <div class="nav-divider"></div>
        <div class="nav-item active"><i class="fas fa-check-circle me-1"></i> EXPENSE</div>
        <div class="nav-divider"></div>
        <div class="nav-item">TRANSFER</div>
    </div>

    <div class="row g-2 mb-3 text-center small">
        <div class="col-6">
            <div class="dropdown">
                <button class="custom-border selector-btn dropdown-toggle w-100"
                        id="accountDropdown"
                        data-bs-toggle="dropdown">
                    <i class="fas fa-wallet fs-5"></i>
                    <span id="selected-account">Account</span>
                </button>
                <ul class="dropdown-menu w-100" id="account-dropdown-menu">
                </ul>
            </div>
        </div>

        <div class="col-6">
            <div class="dropdown">
                <button class="custom-border selector-btn dropdown-toggle w-100"
                        id="CategoryDropdown"
                        data-bs-toggle="dropdown">
                    <i class="fas fa-wallet fs-5"></i>
                    <span id="selected-category">Category</span>
                </button>
                <ul class="dropdown-menu w-100" id="category-list">
                </ul>
            </div>
        </div>
    </div>

    <textarea id="note-message" class="form-control custom-border mb-3" rows="4" placeholder="Add notes"></textarea>
    <div class="custom-border d-flex justify-content-between align-items-center px-3 py-2 mb-2">
        <div class="display-area w-100" id="calc-display">0</div>
        <i class="fas fa-backspace fs-4 ms-2" style="cursor: pointer;" id="btn-backspace"></i>
    </div>

    <div class="keypad-container">
        <div class="calc-btn custom-border btn-op">+</div>
        <div class="calc-btn custom-border btn-num">7</div>
        <div class="calc-btn custom-border btn-num">8</div>
        <div class="calc-btn custom-border btn-num">9</div>
        <div class="calc-btn custom-border btn-op">-</div>
        <div class="calc-btn custom-border btn-num">4</div>
        <div class="calc-btn custom-border btn-num">5</div>
        <div class="calc-btn custom-border btn-num">6</div>
        <div class="calc-btn custom-border btn-op">&times;</div>
        <div class="calc-btn custom-border btn-num">1</div>
        <div class="calc-btn custom-border btn-num">2</div>
        <div class="calc-btn custom-border btn-num">3</div>
        <div class="calc-btn custom-border btn-op">&divide;</div>
        <div class="calc-btn custom-border btn-num">0</div>
        <div class="calc-btn custom-border btn-num">.</div>
        <div class="calc-btn custom-border btn-op">=</div>
    </div>

    <div class="row text-center footer">
        <div class="col-6 border-end border-secondary">
            <input type="text" id="current-date" class="datetime-input" readonly>
        </div>
        <div class="col-6">
            <input type="text" id="current-time" class="datetime-input" readonly>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script th:src="@{/js/createNotes.js}"></script>
<script th:src="@{/js/calculator.js}"></script>
</body>
</html>
